<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>משימה 1 - מה המרכיב הסודי?</title>
<link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Varela Round', Arial, sans-serif;
  direction: rtl; overflow: hidden; height: 100vh;
  background: linear-gradient(160deg, #0a1a10, #0d2e18);
  color: white;
}
.topbar { display:flex; align-items:center; justify-content:space-between; padding:12px 20px; }
.mission-badge { background:rgba(247,201,72,0.15); border:1px solid rgba(247,201,72,0.35); border-radius:20px; padding:6px 16px; font-size:13px; font-weight:700; color:#f7c948; }
.btn-skip { background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.15); border-radius:20px; padding:7px 16px; font-family:inherit; font-size:13px; font-weight:700; color:rgba(255,255,255,0.55); cursor:pointer; transition:all 0.2s; }
.btn-skip:hover { background:rgba(255,255,255,0.14); color:white; }

.main { display:flex; flex-direction:column; align-items:center; justify-content:center; height:calc(100vh - 56px); padding:0 20px; }

.title { font-size:22px; font-weight:900; text-align:center; margin-bottom:16px; color:white; text-shadow:0 2px 10px rgba(0,0,0,0.4); }
.title span { color:#f7c948; }

/* MYSTERY BOX */
.mystery-box { position:relative; width:150px; height:150px; margin-bottom:18px; }
.mystery-emoji { width:150px; height:150px; display:flex; align-items:center; justify-content:center; font-size:84px; background:radial-gradient(circle at 40% 35%,#1e4d2b,#0a1a10); border-radius:22px; border:2px solid rgba(255,255,255,0.08); box-shadow:0 8px 32px rgba(0,0,0,0.5); filter:blur(8px); transition:filter 2s ease; user-select:none; }
.mystery-emoji.revealed { filter:blur(0); animation:popIn 0.6s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes popIn { 0%{transform:scale(0.7);} 100%{transform:scale(1);} }
.qmarks { position:absolute; inset:0; pointer-events:none; transition:opacity 0.8s; }
.qmarks.hidden { opacity:0; }
.qm { position:absolute; font-size:22px; font-weight:900; color:rgba(247,201,72,0.6); animation:floatQ ease-in-out infinite; }
.qm:nth-child(1){top:8px;right:14px;animation-duration:2.1s;}
.qm:nth-child(2){top:20px;left:10px;animation-duration:2.6s;animation-delay:0.4s;font-size:16px;}
.qm:nth-child(3){bottom:14px;right:20px;animation-duration:1.9s;animation-delay:0.8s;font-size:18px;}
.qm:nth-child(4){bottom:8px;left:16px;animation-duration:2.4s;animation-delay:0.2s;}
@keyframes floatQ { 0%,100%{transform:translateY(0) rotate(-5deg);} 50%{transform:translateY(-8px) rotate(5deg);} }

/* CLUE DOTS */
.clue-counter { display:flex; gap:7px; margin-bottom:12px; }
.dot { width:10px; height:10px; border-radius:50%; background:rgba(255,255,255,0.2); transition:all 0.3s; }
.dot.active { background:#f7c948; transform:scale(1.3); }
.dot.done { background:rgba(247,201,72,0.5); transform:scale(1); }

/* CLUE (single, replaces previous) */
.clues-area { width:100%; max-width:320px; margin-bottom:16px; min-height:58px; }
.clue-card { background:rgba(255,255,255,0.06); border:1.5px solid rgba(255,255,255,0.1); border-radius:14px; padding:10px 15px; display:flex; align-items:center; gap:12px; opacity:0; transform:translateX(20px); transition:opacity 0.5s,transform 0.5s; font-size:15px; font-weight:700; }
.clue-card.show { opacity:1; transform:translateX(0); }
.clue-icon { font-size:22px; flex-shrink:0; }

/* INPUT ROW */
.input-row { display:flex; gap:10px; width:100%; max-width:320px; margin-bottom:8px; }
.guess-input {
  flex:1; padding:13px 18px;
  border:2px solid rgba(255,255,255,0.18); border-radius:50px;
  background:rgba(255,255,255,0.08); backdrop-filter:blur(6px);
  font-family:inherit; font-size:16px; font-weight:700;
  color:white; text-align:center; outline:none; transition:all 0.2s;
}
.guess-input::placeholder { color:rgba(255,255,255,0.35); }
.guess-input:focus { border-color:rgba(247,201,72,0.6); background:rgba(255,255,255,0.12); }
.guess-input.wrong { border-color:rgba(220,80,80,0.7); animation:shake 0.4s; }
.guess-input.correct { border-color:rgba(87,201,122,0.8); background:rgba(87,201,122,0.1); }
@keyframes shake { 0%,100%{transform:translateX(0);} 20%{transform:translateX(-8px);} 40%{transform:translateX(8px);} 60%{transform:translateX(-5px);} 80%{transform:translateX(5px);} }

.btn-send {
  background:linear-gradient(135deg,#f7c948,#ff9f2f);
  color:#1a1a1a; border:none; border-radius:50px;
  padding:13px 20px; font-family:inherit; font-size:22px;
  cursor:pointer; transition:all 0.2s;
  box-shadow:0 4px 16px rgba(247,201,72,0.4);
}
.btn-send:hover { transform:scale(1.07); }
.btn-send:active { transform:scale(0.95); }
.btn-send:disabled { opacity:0.4; pointer-events:none; }

/* CLUE BUTTON */
.btn-clue {
  background:rgba(255,255,255,0.09); border:1.5px solid rgba(255,255,255,0.2);
  border-radius:50px; padding:11px 32px;
  font-family:inherit; font-size:15px; font-weight:700;
  color:rgba(255,255,255,0.8); cursor:pointer; transition:all 0.2s;
  width:100%; max-width:320px;
}
.btn-clue:hover { background:rgba(255,255,255,0.16); color:white; }
.btn-clue:disabled { opacity:0.3; pointer-events:none; }

.feedback { font-size:14px; font-weight:700; min-height:20px; text-align:center; margin-top:6px; color:rgba(220,80,80,0.9); }

/* SUCCESS */
#successScreen { position:fixed; inset:0; z-index:50; background:radial-gradient(circle at center,#1a5e35,#0a1a10); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; opacity:0; pointer-events:none; transition:opacity 0.5s; }
#successScreen.show { opacity:1; pointer-events:auto; }
.success-emoji { font-size:80px; animation:bounceIn 0.7s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes bounceIn { 0%{transform:scale(0);} 100%{transform:scale(1);} }
.success-title { font-size:28px; font-weight:900; color:white; text-align:center; }
.success-sub { font-size:16px; color:rgba(255,255,255,0.75); text-align:center; }
.btn-continue { margin-top:10px; background:linear-gradient(135deg,#f7c948,#ff9f2f); color:#1a1a1a; border:none; border-radius:50px; padding:15px 50px; font-family:inherit; font-size:19px; font-weight:900; cursor:pointer; box-shadow:0 6px 22px rgba(247,201,72,0.5); animation:pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{box-shadow:0 6px 22px rgba(247,201,72,0.5);} 50%{box-shadow:0 8px 32px rgba(247,201,72,0.8);transform:scale(1.03);} }
.stars-burst { position:fixed; inset:0; pointer-events:none; z-index:49; overflow:hidden; }
.star-p { position:absolute; font-size:24px; animation:starFly 1.2s ease-out forwards; }
@keyframes starFly { 0%{opacity:1;transform:translate(0,0) scale(1) rotate(0deg);} 100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0.3) rotate(360deg);} }
</style>
</head>

    <div class="qmarks" id="qmarks">
      <span class="qm">?</span><span class="qm">?</span>
      <span class="qm">?</span><span class="qm">?</span>
    </div>
  </div>

  <div class="clue-counter" id="clueDots"></div>
  <div class="clues-area" id="cluesArea"></div>

  <div class="input-row">
    <input class="guess-input" id="guessInput" type="text"
      placeholder="כתבו את תשובתכם..." maxlength="20"
      onkeydown="if(event.key==='Enter') checkGuess()">
    <button class="btn-send" id="btnSend" onclick="checkGuess()">➤</button>
  </div>

  <div class="feedback" id="feedback"></div>

  <button class="btn-clue" id="btnClue" onclick="showNextClue()">💡 תנו לי רמז</button>
</div>

<div id="successScreen">
  <div class="stars-burst" id="starsBurst"></div>
  <div class="success-emoji">🍝</div>
  <div class="success-title">כל הכבוד! 🎉</div>
  <div class="success-sub">ניחשת נכון — <strong>פסטה!</strong><br>המרכיב המרכזי במנה 🧀</div>
  <button class="btn-continue" onclick="goNext()">המשך למשימה 2 →</button>
</div>

<script>
const CLUES = [
  { icon: '🤫', text: 'כולם חושבים שהומצאתי באיטליה — אבל אני בעצם מסין!' },
  { icon: '🍳', text: 'מבשלים אותי בסיר עם מים רותחים' },
  { icon: '🇺🇸', text: 'באמריקה מכינים ממני מק אנד ציז' },
];
const CORRECT = ['פסטה', 'pasta', 'PASTA', 'Pasta'];
const WRONG_MSGS = ['לא בדיוק, נסו שוב! 💪', 'ממש קרוב! 🤔', 'חשבו שוב... 🧐'];

let currentClue = 0;
let wrongCount = 0;
let solved = false;

// Build dots
const dotsEl = document.getElementById('clueDots');
CLUES.forEach((_, i) => {
  const d = document.createElement('div');
  d.className = 'dot'; d.id = 'dot' + i;
  dotsEl.appendChild(d);
});

function showNextClue() {
  if (currentClue >= CLUES.length) return;
  const clue = CLUES[currentClue];
  if (currentClue > 0) {
    document.getElementById('dot'+(currentClue-1)).classList.remove('active');
    document.getElementById('dot'+(currentClue-1)).classList.add('done');
  }
  document.getElementById('dot'+currentClue).classList.add('active');
  const area = document.getElementById('cluesArea');
  // fade out old clue then replace
  const old = area.querySelector('.clue-card');
  if (old) {
    old.style.opacity = '0';
    old.style.transform = 'translateX(-20px)';
    setTimeout(() => { area.innerHTML = ''; addCard(clue); }, 400);
  } else {
    addCard(clue);
  }
  function addCard(c) {
    const card = document.createElement('div');
    card.className = 'clue-card';
    card.innerHTML = '<span class="clue-icon">'+c.icon+'</span><span>'+c.text+'</span>';
    area.appendChild(card);
    requestAnimationFrame(() => card.classList.add('show'));
  }
  currentClue++;
  if (currentClue >= CLUES.length) {
    document.getElementById('btnClue').disabled = true;
    document.getElementById('dot'+(currentClue-1)).classList.remove('active');
    document.getElementById('dot'+(currentClue-1)).classList.add('done');
  }
  // focus input after clue
  document.getElementById('guessInput').focus();
}

function checkGuess() {
  if (solved) return;
  const input = document.getElementById('guessInput');
  const val = input.value.trim();
  if (!val) return;

  if (CORRECT.includes(val)) {
    solved = true;
    input.classList.add('correct');
    document.getElementById('btnSend').disabled = true;
    document.getElementById('btnClue').disabled = true;
    document.getElementById('mysteryEmoji').classList.add('revealed');
    document.getElementById('qmarks').classList.add('hidden');
    document.getElementById('feedback').textContent = '';
    setTimeout(() => { launchStars(); document.getElementById('successScreen').classList.add('show'); }, 2500);
  } else {
    wrongCount++;
    input.classList.add('wrong');
    input.value = '';
    document.getElementById('feedback').textContent = WRONG_MSGS[Math.min(wrongCount-1, WRONG_MSGS.length-1)];
    setTimeout(() => input.classList.remove('wrong'), 500);
    // auto-show next clue after wrong answer
    if (currentClue < CLUES.length) {
      setTimeout(() => showNextClue(), 700);
    }
  }
}

function launchStars() {
  const burst = document.getElementById('starsBurst');
  ['⭐','✨','🌟','💫','🎉'].forEach(e => {
    for (let j = 0; j < 4; j++) {
      const s = document.createElement('span');
      s.className = 'star-p'; s.textContent = e;
      const angle = Math.random()*360, dist = 120+Math.random()*140;
      s.style.cssText = 'left:50%;top:50%;--tx:'+Math.cos(angle*Math.PI/180)*dist+'px;--ty:'+Math.sin(angle*Math.PI/180)*dist+'px;animation-delay:'+Math.random()*0.3+'s;';
      burst.appendChild(s);
    }
  });
}

function goNext() { window.location.href = 'story2_mission2.html'; }
</script>

</html>
