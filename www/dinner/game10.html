<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Assistant:wght@700;800;900&display=swap" rel="stylesheet">
<title>משחק 10 - מצאו בגינה</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none}
body{background:#1A3A1A;display:flex;justify-content:center;align-items:flex-start;font-family:'Assistant',sans-serif;direction:rtl;min-height:100vh}
#app{width:100%;max-width:440px;display:flex;flex-direction:column;min-height:100vh}

@keyframes starPop{from{transform:scale(0) rotate(-20deg);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes checkPop{0%{transform:scale(0) rotate(-15deg);opacity:0}60%{transform:scale(1.35)}100%{transform:scale(1);opacity:1}}
@keyframes ripple{0%{transform:translate(-50%,-50%) scale(0);opacity:.85}100%{transform:translate(-50%,-50%) scale(4.5);opacity:0}}
@keyframes floatUp{0%{opacity:1;transform:translate(-50%,-130%)}100%{opacity:0;transform:translate(-50%,-240%)}}
@keyframes glow{0%,100%{box-shadow:0 0 10px rgba(255,213,79,.5)}50%{box-shadow:0 0 24px rgba(255,213,79,1)}}
@keyframes foundBounce{0%{transform:scale(1)}40%{transform:scale(1.25)}100%{transform:scale(1)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}

/* HEADER */
#hdr{background:linear-gradient(135deg,#1B5E20,#33691E);padding:14px 18px 12px;color:white;text-align:center;flex-shrink:0}
#badge{display:inline-block;background:rgba(255,255,255,.2);border-radius:20px;padding:3px 14px;font-size:12px;font-weight:700;margin-bottom:5px}
#htitle{font-family:'Fredoka One',cursive;font-size:19px;line-height:1.35;margin-bottom:4px}
#hsub{font-size:13px;opacity:.92;font-weight:800;line-height:1.4}

/* TARGET BAR */
#target-bar{background:#1E1000;padding:12px 14px 14px;flex-shrink:0}
#target-label{font-size:14px;font-weight:900;color:#F7C948;margin-bottom:10px;text-align:center;letter-spacing:.3px;line-height:1.4}
#targets{display:flex;gap:10px;justify-content:center}
.tgt{
  background:#2D1800;border:3px solid #7D5500;border-radius:16px;
  padding:10px 10px 8px;display:flex;flex-direction:column;align-items:center;gap:4px;
  transition:all .35s;min-width:70px;position:relative;
}
.tgt.found{border-color:#4CAF50;background:#1A4A1A;animation:glow .9s ease infinite}
.tgt-em{font-size:34px;line-height:1}
.tgt-lb{font-size:13px;font-weight:900;color:#FFCC80;text-align:center}
.tgt.found .tgt-lb{color:#A5D6A7}
.chk{position:absolute;top:-9px;right:-9px;background:#4CAF50;color:white;
      border-radius:50%;width:24px;height:24px;display:flex;align-items:center;
      justify-content:center;font-size:14px;font-weight:900;animation:checkPop .4s ease;
      box-shadow:0 2px 8px rgba(0,0,0,.4)}
.tgt:not(.found){animation:pulse 2s ease infinite}

/* PROGRESS */
#prog-row{background:#152015;padding:6px 16px;text-align:center;flex-shrink:0;border-bottom:2px solid #1B5E20}
#prog-txt{font-size:14px;font-weight:900;color:#81C784}

/* GARDEN */
#garden-wrap{position:relative;flex:1;overflow:hidden}
#garden-img{width:100%;display:block}

/* HOTSPOTS */
.hs{position:absolute;border-radius:50%;border:4px solid transparent;
     background:transparent;transform:translate(-50%,-50%);cursor:pointer;
     transition:border-color .2s,background .2s}
.hs:hover,.hs:active{border-color:rgba(255,213,79,.75);background:rgba(255,213,79,.2)}
.hs.found{border-color:rgba(76,175,80,.8)!important;background:rgba(76,175,80,.25)!important;
           pointer-events:none;animation:foundBounce .45s ease}
.hs.found::after{content:'✓';position:absolute;inset:0;display:flex;align-items:center;
                  justify-content:center;color:white;font-size:26px;font-weight:900;
                  text-shadow:0 2px 6px rgba(0,0,0,.7);animation:checkPop .4s ease}

.rip{position:absolute;border-radius:50%;border:4px solid #FFD54F;pointer-events:none;
      animation:ripple .7s ease forwards}

.flbl{position:absolute;background:rgba(0,0,0,.82);color:#FFD54F;
       font-family:'Fredoka One',cursive;font-size:17px;border-radius:14px;
       padding:6px 14px;pointer-events:none;white-space:nowrap;
       transform:translate(-50%,-130%);animation:floatUp 1.3s ease forwards}

/* SKIP */
#skip-btn{position:absolute;top:10px;left:10px;background:rgba(0,0,0,.55);border:none;
           border-radius:14px;padding:6px 14px;color:rgba(255,255,255,.75);
           font-size:13px;font-weight:800;cursor:pointer;font-family:'Assistant',sans-serif;z-index:10}

/* DONE */
#done-screen{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.92);
              flex-direction:column;align-items:center;justify-content:center;gap:16px;
              text-align:center;padding:28px}
.ov-title{font-family:'Fredoka One',cursive;font-size:30px;color:white}
.ov-sub{font-size:15px;color:#A5D6A7;font-weight:700;line-height:1.7;max-width:290px}
#stars-row{display:flex;gap:14px}
.fstr{font-size:52px;animation:starPop .5s ease both}
.ov-btn{background:linear-gradient(135deg,#1B5E20,#4CAF50);color:white;border:none;
         border-radius:24px;padding:16px 52px;font-size:19px;
         font-family:'Fredoka One',cursive;cursor:pointer;
         box-shadow:0 5px 20px rgba(76,175,80,.55)}
.ov-btn2{background:rgba(255,255,255,.14);color:rgba(255,255,255,.75);border:none;
          border-radius:22px;padding:11px 30px;font-size:14px;
          font-family:'Assistant',sans-serif;font-weight:800;cursor:pointer}
</style>
</head>

<div id="done-screen">
  <div style="font-size:72px">🎉</div>
  <div class="ov-title">כל הכבוד!</div>
  <div id="stars-row"></div>
  <div class="ov-sub">מצאתם את כל 4 הירקות של הפסטה בזוקה בגינה! 🌿🍝</div>
  <button class="ov-btn" onclick="window.location.href='game11.html'">המשחק הבא ▶</button>
  <button class="ov-btn2" onclick="resetGame()" style="margin-top:4px">🔄 שחקו שוב</button>
</div>

<script>
const ITEMS=[
  {id:'belek',  label:'סלק',   emoji:'🟣',
   zones:[{cx:0.100,cy:0.610},{cx:0.085,cy:0.820}], rP:0.085},
  {id:'batsal', label:'בצל',   emoji:'🧅',
   zones:[{cx:0.710,cy:0.575}], rP:0.090},
  {id:'shum',   label:'שום',   emoji:'🧄',
   zones:[{cx:0.440,cy:0.555}], rP:0.085},
  {id:'timein', label:'טימין', emoji:'🌿',
   zones:[{cx:0.335,cy:0.645}], rP:0.085},
];

let found=new Set();

function buildHotspots(){
  const wrap=document.getElementById('garden-wrap');
  wrap.querySelectorAll('.hs').forEach(e=>e.remove());
  const iw=document.getElementById('garden-img').clientWidth;
  const ih=document.getElementById('garden-img').clientHeight;
  ITEMS.forEach(item=>{
    item.zones.forEach(z=>{
      const cx=z.cx*iw, cy=z.cy*ih, r=item.rP*iw;
      const div=document.createElement('div');
      div.className='hs'+(found.has(item.id)?' found':'');
      div.style.cssText=`left:${cx}px;top:${cy}px;width:${r*2}px;height:${r*2}px;`;
      div.dataset.id=item.id;
      div.addEventListener('click',()=>onTap(item,cx,cy,r,div));
      wrap.appendChild(div);
    });
  });
}

function onTap(item,cx,cy,r,el){
  if(found.has(item.id))return;
  found.add(item.id);
  const wrap=document.getElementById('garden-wrap');
  // ripple
  const rip=document.createElement('div');
  rip.className='rip';
  rip.style.cssText=`left:${cx}px;top:${cy}px;width:${r*2}px;height:${r*2}px;`;
  wrap.appendChild(rip);setTimeout(()=>rip.remove(),750);
  // float label
  const lbl=document.createElement('div');
  lbl.className='flbl';
  lbl.textContent=item.emoji+' '+item.label+'!';
  lbl.style.cssText=`left:${cx}px;top:${cy}px;`;
  wrap.appendChild(lbl);setTimeout(()=>lbl.remove(),1350);
  // mark all zones
  document.querySelectorAll('.hs[data-id="'+item.id+'"]').forEach(h=>h.classList.add('found'));
  // target bar
  const t=document.getElementById('t-'+item.id);
  t.classList.add('found');t.style.animation='none';
  if(!t.querySelector('.chk')){const cb=document.createElement('div');cb.className='chk';cb.textContent='✓';t.appendChild(cb);}
  aud();updateProgress();
  if(found.size===ITEMS.length)setTimeout(showDone,850);
}

function updateProgress(){
  const n=found.size,total=ITEMS.length;
  document.getElementById('prog-txt').textContent=
    n===total?'🎉 מצאתם את כולם!':n+' מתוך '+total+' נמצאו 🌿';
}

function showDone(){
  const sr=document.getElementById('stars-row');sr.innerHTML='';
  for(let i=0;i<3;i++){const s=document.createElement('span');s.className='fstr';s.style.animationDelay=(i*.18)+'s';s.textContent='⭐';sr.appendChild(s);}
  document.getElementById('done-screen').style.display='flex';
  const d=JSON.parse(localStorage.getItem('dinner_stars_detail')||'[]');
  while(d.length<11)d.push(0);d[9]=3;
  localStorage.setItem('dinner_stars_detail',JSON.stringify(d));
  localStorage.setItem('dinner_stars',d.reduce((a,b)=>a+b,0));
}

function resetGame(){
  found.clear();
  document.querySelectorAll('.tgt').forEach(t=>{t.classList.remove('found');const c=t.querySelector('.chk');if(c)c.remove();t.style.animation='';});
  document.getElementById('done-screen').style.display='none';
  updateProgress();buildHotspots();
}

function aud(){
  try{
    const a=new(window.AudioContext||window.webkitAudioContext)();
    const o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);
    o.type='sine';
    o.frequency.setValueAtTime(523,a.currentTime);
    o.frequency.setValueAtTime(659,a.currentTime+.1);
    o.frequency.setValueAtTime(784,a.currentTime+.2);
    g.gain.setValueAtTime(.18,a.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,a.currentTime+.4);
    o.start();o.stop(a.currentTime+.4);
  }catch(e){}
}

const img=document.getElementById('garden-img');
if(img.complete)buildHotspots(); else img.onload=buildHotspots;
window.addEventListener('resize',buildHotspots);
</script>
