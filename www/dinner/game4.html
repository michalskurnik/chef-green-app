<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Assistant:wght@700;800&display=swap" rel="stylesheet">
<title>משחק 4 - איסוף מרכיבים</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none}
body{background:#FFF8E7;display:flex;justify-content:center;padding:16px 10px 36px;font-family:'Assistant',sans-serif;direction:rtl;min-height:100vh}
#app{width:100%;max-width:360px;background:#fff;border-radius:26px;box-shadow:0 12px 40px rgba(0,0,0,.13);overflow:hidden;animation:fadeUp .4s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes starPop{from{transform:scale(0) rotate(-15deg);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes pop{0%{transform:scale(.3);opacity:0}65%{transform:scale(1.18)}100%{transform:scale(1);opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}
@keyframes correctBounce{0%{transform:scale(1)}40%{transform:scale(1.12)}100%{transform:scale(1)}}

#hdr{padding:13px 18px 15px;color:#fff;text-align:center;background:linear-gradient(135deg,#C2185B,#E91E8C);transition:background .6s}
#hdr.done{background:linear-gradient(135deg,#FF6B35,#F7C948)}
#badge{display:inline-block;background:rgba(255,255,255,.22);border-radius:20px;padding:2px 13px;font-size:12px;font-weight:700;margin-bottom:6px}
#htitle{font-family:'Fredoka One',cursive;font-size:20px;margin-bottom:4px}
#hsub{font-size:12px;opacity:.9;font-weight:700;line-height:1.5}

/* image */
#bunny-img{width:100%;display:block;border-bottom:1.5px solid #F0E8D8}

/* basket */
#basket-wrap{padding:8px 14px 4px}
#basket-label{font-size:11px;font-weight:800;color:#888;margin-bottom:5px}
#basket{display:flex;gap:6px;flex-wrap:wrap;min-height:52px}
.bas-item{
  border-radius:10px;border:2px solid #C2185B;background:#FCE4EC;
  display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:5px 6px;animation:pop .3s ease;
}
.bas-item .bi-em{font-size:22px;line-height:1}
.bas-item .bi-lb{font-size:9px;font-weight:800;color:#880E4F;text-align:center}

/* check btn */
#check-row{display:flex;align-items:center;justify-content:space-between;padding:4px 14px 6px}
#sel-count{font-size:12px;font-weight:800;color:#888}
#check-btn{background:linear-gradient(135deg,#C2185B,#E91E8C);color:#fff;border:none;border-radius:14px;padding:6px 18px;font-size:13px;font-weight:800;cursor:pointer;font-family:'Assistant',sans-serif;opacity:.4;transition:all .25s;pointer-events:none}
#check-btn.ready{opacity:1;pointer-events:auto;box-shadow:0 3px 12px rgba(194,24,91,.4)}

/* grid */
#grid{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;padding:4px 14px 10px}
.item{
  border-radius:12px;padding:8px 2px 6px;
  display:flex;flex-direction:column;align-items:center;gap:3px;
  cursor:pointer;border:2px solid #EEE;background:#FAFAFA;
  transition:all .2s;
}
.item:active{transform:scale(.93)}
.item.selected{border-color:#C2185B;background:#FCE4EC}
.item.correct{border-color:#4CAF50;background:#E8F5E9;animation:correctBounce .35s ease}
.item.wrong{border-color:#EF5350;background:#FFEBEE;animation:shake .35s ease}
.item span.em{font-size:26px;line-height:1}
.item span.lb{font-size:9px;font-weight:800;color:#555;text-align:center;line-height:1.2}
.item.selected span.lb{color:#880E4F}
.item.correct span.lb{color:#2E7D32}
.item.wrong span.lb{color:#C62828}

#hint{text-align:center;padding:2px 16px 10px;font-size:12px;font-weight:700;color:#888;min-height:22px}

/* done */
#done-panel{display:none;flex-direction:column;align-items:center;padding:10px 20px 24px}
#stars{display:flex;gap:12px;padding:4px 0 10px}
.str{font-size:40px;filter:drop-shadow(0 2px 6px gold)}
#dmsg{font-size:14px;font-weight:700;color:#636e72;text-align:center;line-height:1.65;margin-bottom:14px}
#nbtn{background:linear-gradient(135deg,#C2185B,#E91E8C);color:#fff;border:none;border-radius:18px;padding:14px 44px;font-size:17px;font-family:'Fredoka One',cursive;cursor:pointer;box-shadow:0 5px 18px rgba(194,24,91,.42)}
</style>
</head>

  <div id="basket-wrap">
    <div id="basket-label">🧺 הסל שלכם:</div>
    <div id="basket"></div>
  </div>

  <div id="check-row">
    <span id="sel-count">0 / 6 נבחרו</span>
    <div style="display:flex;gap:8px">
      <button onclick="window.location.href='game5.html'" style="background:none;border:2px solid #DDD;border-radius:14px;padding:6px 14px;font-size:12px;font-weight:800;color:#AAA;cursor:pointer;font-family:'Assistant',sans-serif">דלג ←</button>
      <button id="check-btn" onclick="checkAnswers()">✅ בדקו!</button>
    </div>
  </div>

  <div id="hint">☝️ לחצו על כל פריט שלדעתכם נמצא בארנבת</div>

  <div id="done-panel">
    <div id="stars">
      <span class="str" id="s0" style="animation:starPop .5s 0s both">⭐</span>
      <span class="str" id="s1" style="animation:starPop .5s .18s both">⭐</span>
      <span class="str" id="s2" style="animation:starPop .5s .36s both">⭐</span>
    </div>
    <p id="dmsg">🎉 מצאתם את כל המרכיבים!</p>
    <button id="nbtn" onclick="window.location.href='game5.html'">המשחק הבא ▶</button>
  </div>
</div>

<script>
const ALL=[
  {id:1, emoji:'🥚', label:'ביצה',          correct:true},
  {id:2, emoji:'🥕', label:'גזר',            correct:true},
  {id:3, emoji:'🥒', label:'מלפפון',         correct:true},
  {id:4, emoji:'🥬', label:'חסה',            correct:true},
  {id:5, emoji:'🍅', label:'עגבנייה שרי',   correct:true},
  {id:6, emoji:'🫒', label:'זיתים',          correct:true},
  {id:7, emoji:'🍉', label:'אבטיח',          correct:false},
  {id:8, emoji:'🥑', label:'אבוקדו',         correct:false},
  {id:9, emoji:'🍝', label:'פסטה',           correct:false},
];

const items=[...ALL].sort(()=>Math.random()-.5);
const selected=new Set();
let submitted=false;

function buildGrid(){
  const grid=document.getElementById('grid');
  grid.innerHTML='';
  items.forEach(item=>{
    const div=document.createElement('div');
    div.className='item';
    div.dataset.id=item.id;
    div.innerHTML=`<span class="em">${item.emoji}</span><span class="lb">${item.label}</span>`;
    div.addEventListener('click',()=>toggle(item,div));
    grid.appendChild(div);
  });
}

function toggle(item,el){
  if(submitted)return;
  if(selected.has(item.id)){
    selected.delete(item.id);
    el.classList.remove('selected');
  } else {
    selected.add(item.id);
    el.classList.add('selected');
  }
  updateBasket();
  updateCheck();
}

function updateBasket(){
  const basket=document.getElementById('basket');
  basket.innerHTML='';
  [...selected].forEach(id=>{
    const item=ALL.find(x=>x.id===id);
    if(!item)return;
    const div=document.createElement('div');
    div.className='bas-item';
    div.innerHTML=`<span class="bi-em">${item.emoji}</span><span class="bi-lb">${item.label}</span>`;
    basket.appendChild(div);
  });
  document.getElementById('sel-count').textContent=`${selected.size} / 6 נבחרו`;
}

function updateCheck(){
  const btn=document.getElementById('check-btn');
  btn.classList.toggle('ready',selected.size>0);
}

function checkAnswers(){
  if(submitted)return;
  submitted=true;
  const correct=ALL.filter(i=>i.correct&&selected.has(i.id)).length;
  const wrong  =ALL.filter(i=>!i.correct&&selected.has(i.id)).length;
  const missed =ALL.filter(i=>i.correct&&!selected.has(i.id)).length;

  document.querySelectorAll('.item').forEach(el=>{
    const id=parseInt(el.dataset.id);
    const item=ALL.find(i=>i.id===id);
    el.classList.remove('selected');
    if(item.correct&&selected.has(id))        el.classList.add('correct');
    else if(!item.correct&&selected.has(id))  el.classList.add('wrong');
  });

  const stars=wrong===0&&missed===0?3:wrong===0?2:1;
  const msgs={3:'🎉 מושלם!',2:'👍 כמעט! פספסתם כמה',1:'💪 נסו שוב!'}
  document.getElementById('hint').textContent=msgs[stars];
  aud(stars===3);
  setTimeout(()=>showDone(stars),stars===3?600:1200);
}

function showDone(stars){
  document.getElementById('hdr').classList.add('done');
  document.getElementById('htitle').textContent='🐰 כל הכבוד!';
  document.getElementById('hsub').textContent='מצאתם את מרכיבי הארנבת! 🎉';
  document.getElementById('grid').style.display='none';
  document.getElementById('check-row').style.display='none';
  document.getElementById('basket-wrap').style.display='none';
  document.getElementById('hint').style.display='none';
  for(let i=stars;i<3;i++){
    const s=document.getElementById('s'+i);
    s.style.filter='grayscale(1) opacity(.25)';s.style.animation='none';
  }
  const msgs=['💪 נסו שוב!','👍 כמעט מושלם!','🎉 מצאתם את כל 6 המרכיבים!'];
  document.getElementById('dmsg').textContent=msgs[stars-1];
  document.getElementById('done-panel').style.display='flex';
  const d=JSON.parse(localStorage.getItem('dinner_stars_detail')||'[0,0,0,0,0]');
  while(d.length<5)d.push(0);
  d[3]=stars;
  localStorage.setItem('dinner_stars_detail',JSON.stringify(d));
  localStorage.setItem('dinner_stars',d.reduce((a,b)=>a+b,0));
}

function aud(ok){
  try{
    const a=new(window.AudioContext||window.webkitAudioContext)();
    const o=a.createOscillator(),g=a.createGain();
    o.connect(g);g.connect(a.destination);
    if(ok){
      o.frequency.setValueAtTime(440,a.currentTime);
      o.frequency.setValueAtTime(554,a.currentTime+.12);
      o.frequency.setValueAtTime(660,a.currentTime+.24);
      g.gain.setValueAtTime(.15,a.currentTime);
      g.gain.exponentialRampToValueAtTime(.001,a.currentTime+.5);
      o.start();o.stop(a.currentTime+.5);
    }else{
      o.type='sawtooth';o.frequency.setValueAtTime(260,a.currentTime);
      o.frequency.exponentialRampToValueAtTime(130,a.currentTime+.2);
      g.gain.setValueAtTime(.1,a.currentTime);
      g.gain.exponentialRampToValueAtTime(.001,a.currentTime+.25);
      o.start();o.stop(a.currentTime+.28);
    }
  }catch(e){}
}

buildGrid();
</script>
