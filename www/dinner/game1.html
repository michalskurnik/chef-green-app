<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Assistant:wght@700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none}
body{background:#FFF8E7;display:flex;justify-content:center;padding:16px 10px 36px;font-family:'Assistant',sans-serif;direction:rtl;min-height:100vh}
#app{width:100%;max-width:360px;background:#fff;border-radius:26px;box-shadow:0 12px 40px rgba(0,0,0,.13);overflow:hidden}
@keyframes slideUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{0%{transform:scale(.3);opacity:0}70%{transform:scale(1.2)}100%{transform:scale(1);opacity:1}}
@keyframes starPop{from{transform:scale(0) rotate(-20deg);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
#app{animation:slideUp .4s ease}

#hdr{background:linear-gradient(135deg,#5C6BC0,#7B1FA2);padding:13px 18px 15px;color:#fff;text-align:center}
#hdr.done{background:linear-gradient(135deg,#FF6B35,#F7C948)}
#badge{display:inline-block;background:rgba(255,255,255,.2);border-radius:20px;padding:2px 12px;font-size:12px;margin-bottom:6px;font-weight:700}
#title{font-family:'Fredoka One',cursive;font-size:20px;margin-bottom:5px}
#instr{font-size:12px;opacity:.88;font-weight:700;line-height:1.5}

#progress{display:flex;gap:6px;padding:8px 16px;justify-content:center;align-items:center}
.dot{width:12px;height:12px;border-radius:50%;background:#E0E0E0;transition:all .35s}
.dot.on{background:#4CAF50;box-shadow:0 1px 6px rgba(76,175,80,.6)}
#prog-txt{font-size:12px;font-weight:800;color:#888;margin-right:6px}

#cw{display:flex;justify-content:center;padding:4px 0 0}
canvas{display:block;touch-action:none}

#tray-label{text-align:center;font-size:12px;font-weight:800;color:#A0855A;padding:6px 0 2px;background:#FAF4E8;border-top:1.5px dashed #E8D8B0}
#tray{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;padding:10px 14px 14px;background:#FAF4E8;min-height:80px}
.t-piece{border-radius:10px;cursor:grab;transition:transform .15s,box-shadow .15s;border:2px solid transparent}
.t-piece:hover{transform:scale(1.07);box-shadow:0 4px 14px rgba(0,0,0,.18)}
.t-piece.used{opacity:.28;pointer-events:none;filter:grayscale(1)}

#done-panel{display:none;flex-direction:column;align-items:center;padding:14px 20px 24px;background:#fff;animation:slideUp .45s ease}
#stars-row{display:flex;gap:12px;padding:4px 0 12px}
.star{font-size:40px;filter:drop-shadow(0 2px 6px gold)}
#done-msg{font-size:14px;font-weight:700;color:#636e72;text-align:center;line-height:1.65;margin-bottom:18px}
#next-btn{background:linear-gradient(135deg,#4CAF50,#66BB6A);color:#fff;border:none;border-radius:18px;padding:14px 44px;font-size:17px;font-family:'Fredoka One',cursive;cursor:pointer;box-shadow:0 5px 18px rgba(76,175,80,.42)}
</style>
</head>
<body>
<div id="app">
  <div id="hdr">
    <div id="badge">✂️ משחק 1 מתוך 3</div>
    <h2 id="title">🤖 בנו את רובוט הטורטייה!</h2>
    <p id="instr">גררו כל חלק למקומו הנכון על הצלחת 👆</p>
  </div>

  <div id="progress">
    <span id="prog-txt">0/6</span>
    <div class="dot" id="d0"></div><div class="dot" id="d1"></div><div class="dot" id="d2"></div>
    <div class="dot" id="d3"></div><div class="dot" id="d4"></div><div class="dot" id="d5"></div>
  </div>

  <div id="cw"><canvas id="c"></canvas></div>

  <div id="tray-label">🫓 חלקי הרובוט — גרור לצלחת</div>
  <div id="tray"></div>

  <div id="done-panel">
    <div id="stars-row">
      <span class="star" style="animation:starPop .5s 0s both">⭐</span>
      <span class="star" style="animation:starPop .5s .18s both">⭐</span>
      <span class="star" style="animation:starPop .5s .36s both">⭐</span>
    </div>
    <p id="done-msg">🎉 כל הכבוד! בניתם רובוט מטורטייה!<br>עכשיו נלמד על הרכיבים הבריאותיים 🥗</p>
    <button id="next-btn" onclick="window.location.href='game2.html'">המשחק הבא ▶</button>
  </div>
</div>

<script>
const DPR = Math.min(window.devicePixelRatio||1,2);
const CW=320, CH=300;
const canvas=document.getElementById('c');
canvas.width=CW*DPR; canvas.height=CH*DPR;
canvas.style.width=CW+'px'; canvas.style.height=CH+'px';
const ctx=canvas.getContext('2d');
ctx.scale(DPR,DPR);

// ─── Plate ────────────────────────────────────────────────────────────────────
const PLX=160, PLY=155, PLR=138;

// ─── Robot layout on plate ────────────────────────────────────────────────────
// Each slot: {id, label, x,y,w,h,  kind:'tort'|'cheese'|'cuke'}
const SLOTS=[
  {id:'head',  label:'ראש',      x:134,y:22,  w:52, h:36, kind:'tort'},
  {id:'body',  label:'גוף',      x:106,y:80,  w:108,h:90, kind:'cheese'},
  {id:'armL',  label:'יד שמאל', x:36, y:88,  w:70, h:28, kind:'tort_cuke'},
  {id:'armR',  label:'יד ימין', x:214,y:88,  w:70, h:28, kind:'tort_cuke'},
  {id:'legL',  label:'רגל שמאל',x:118,y:170, w:34, h:90, kind:'tort_cuke_v'},
  {id:'legR',  label:'רגל ימין',x:168,y:170, w:34, h:90, kind:'tort_cuke_v'},
];

// ─── State ────────────────────────────────────────────────────────────────────
const placed={}; // id -> true
let drag=null;   // {slotId, startX, startY, curX, curY, pieceEl}
let animT=0;
let doneFlag=false;

// ─── Draw plate ───────────────────────────────────────────────────────────────
function drawPlate(){
  // Shadow
  ctx.save();
  ctx.shadowColor='rgba(0,0,0,.18)';ctx.shadowBlur=22;ctx.shadowOffsetY=8;
  ctx.beginPath();ctx.arc(PLX,PLY,PLR,0,Math.PI*2);ctx.fillStyle='#95C5DE';ctx.fill();
  ctx.restore();
  // Rim
  ctx.beginPath();ctx.arc(PLX,PLY,PLR,0,Math.PI*2);ctx.fillStyle='#B5D8ED';ctx.fill();
  // Surface
  ctx.beginPath();ctx.arc(PLX,PLY,PLR-6,0,Math.PI*2);ctx.fillStyle='#D6EEFA';ctx.fill();
  ctx.beginPath();ctx.arc(PLX,PLY,PLR-6,0,Math.PI*2);ctx.strokeStyle='rgba(255,255,255,.55)';ctx.lineWidth=2;ctx.stroke();
}

// ─── Draw a robot piece by kind ───────────────────────────────────────────────
function drawPiece(ctx,x,y,w,h,kind,alpha=1){
  ctx.save();ctx.globalAlpha=alpha;

  if(kind==='cheese'){
    // Yellow cheese square
    const g=ctx.createLinearGradient(x,y,x+w,y+h);
    g.addColorStop(0,'#FFF176');g.addColorStop(.5,'#F9D03E');g.addColorStop(1,'#E6B810');
    ctx.fillStyle=g;
    rr(ctx,x,y,w,h,6);ctx.fill();
    ctx.strokeStyle='#C8A010';ctx.lineWidth=1.8;rr(ctx,x,y,w,h,6);ctx.stroke();
    // Texture dots
    for(let i=0;i<4;i++){
      ctx.save();ctx.fillStyle='rgba(180,130,0,.15)';
      ctx.beginPath();ctx.arc(x+12+i*22,y+h/2,4,0,Math.PI*2);ctx.fill();ctx.restore();
    }
  }
  else if(kind==='tort'){
    // Beige tortilla strip horizontal
    tortRect(ctx,x,y,w,h);
  }
  else if(kind==='tort_cuke'){
    // horizontal: tortilla body + green cucumber ends
    const cw=Math.round(w*.22);
    // cuke left
    cukeRect(ctx,x,y,cw,h);
    // tortilla middle
    tortRect(ctx,x+cw,y,w-cw*2,h);
    // cuke right
    cukeRect(ctx,x+w-cw,y,cw,h);
  }
  else if(kind==='tort_cuke_v'){
    // vertical: tortilla body + green cucumber bottom
    const ch_=Math.round(h*.2);
    tortRect(ctx,x,y,w,h-ch_);
    cukeRect(ctx,x,y+h-ch_,w,ch_);
  }

  ctx.restore();
}

function tortRect(ctx,x,y,w,h){
  const g=ctx.createLinearGradient(x,y,x,y+h);
  g.addColorStop(0,'#F5E8C4');g.addColorStop(.45,'#E8D090');g.addColorStop(1,'#C9A850');
  ctx.fillStyle=g;rr(ctx,x,y,w,h,5);ctx.fill();
  ctx.strokeStyle='#A8882A';ctx.lineWidth=1.5;rr(ctx,x,y,w,h,5);ctx.stroke();
  // Sesame-like dots
  const dotCount=Math.floor(w*h/160);
  const seed=x*7+y*3;
  for(let i=0;i<dotCount;i++){
    const dx=((seed*i*17+13)%1000)/1000;
    const dy=((seed*i*23+7)%1000)/1000;
    ctx.save();ctx.fillStyle='rgba(100,70,10,.25)';
    ctx.beginPath();ctx.ellipse(x+4+dx*(w-8),y+3+dy*(h-6),2.5,1.5,Math.PI/4,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }
}

function cukeRect(ctx,x,y,w,h){
  const g=ctx.createLinearGradient(x,y,x+w,y+h);
  g.addColorStop(0,'#A5D63E');g.addColorStop(1,'#5B9E18');
  ctx.fillStyle=g;rr(ctx,x,y,w,h,4);ctx.fill();
  ctx.strokeStyle='#4A8012';ctx.lineWidth=1.5;rr(ctx,x,y,w,h,4);ctx.stroke();
}

function rr(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

// ─── Draw slot outline (ghost) ────────────────────────────────────────────────
function drawSlotGhost(slot,t){
  if(placed[slot.id])return;
  const pulse=.4+Math.sin(t*.07)*.25;
  ctx.save();
  ctx.setLineDash([7,5]);ctx.lineDashOffset=-(t*.4)%16;
  ctx.strokeStyle=`rgba(80,140,220,${pulse})`;ctx.lineWidth=2.2;
  rr(ctx,slot.x,slot.y,slot.w,slot.h,6);ctx.stroke();
  ctx.restore();
  // Label
  ctx.save();ctx.fillStyle=`rgba(60,120,200,${pulse*.9})`;
  ctx.font=`700 11px 'Assistant',sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(slot.label,slot.x+slot.w/2,slot.y+slot.h/2);
  ctx.restore();
}

// ─── Robot face (drawn after body placed) ─────────────────────────────────────
function drawRobotFace(){
  const hs=SLOTS[0]; // head slot
  if(!placed['head'])return;
  const cx=hs.x+hs.w/2, cy=hs.y+hs.h/2;
  // Eyes
  [[cx-11,cy-4],[cx+11,cy-4]].forEach(([ex,ey])=>{
    ctx.fillStyle='#263238';rr(ctx,ex-7,ey-6,14,12,2);ctx.fill();
    ctx.fillStyle='#64B5F6';ctx.beginPath();ctx.arc(ex,ey,4,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='white';ctx.beginPath();ctx.arc(ex-2,ey-2,1.8,0,Math.PI*2);ctx.fill();
  });
  // Mouth
  ctx.fillStyle='#263238';rr(ctx,cx-10,cy+6,20,5,2);ctx.fill();
  ['#E53935','#FDD835','#43A047'].forEach((c,i)=>{ctx.fillStyle=c;ctx.fillRect(cx-9+i*7,cy+6,6,5);});
  // Antenna
  ctx.strokeStyle='#90A4AE';ctx.lineWidth=2;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(cx,hs.y);ctx.lineTo(cx,hs.y-16);ctx.stroke();
  ctx.fillStyle='#FF5722';ctx.beginPath();ctx.arc(cx,hs.y-20,5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='white';ctx.beginPath();ctx.arc(cx,hs.y-20,2,0,Math.PI*2);ctx.fill();
}

function drawBodyDeco(){
  if(!placed['body'])return;
  const bs=SLOTS[1];
  const cx=bs.x+bs.w/2, cy=bs.y+bs.h/2;
  const btns=['#E53935','#FDD835','#43A047','#1E88E5','#AB47BC','#FF7043'];
  btns.forEach((c,i)=>{
    const col=i%3, row=Math.floor(i/3);
    const bx=cx-22+col*22, by=cy-20+row*26;
    ctx.save();ctx.shadowColor=c;ctx.shadowBlur=6;
    ctx.fillStyle=c;ctx.beginPath();ctx.arc(bx,by,7,0,Math.PI*2);ctx.fill();
    ctx.restore();
    ctx.strokeStyle='rgba(0,0,0,.2)';ctx.lineWidth=1;ctx.stroke();
  });
  // Speaker
  ctx.fillStyle='#263238';rr(ctx,cx-22,cy+22,44,10,5);ctx.fill();
  for(let i=0;i<5;i++){ctx.fillStyle=i%2?'#37474F':'#455A64';rr(ctx,cx-21+i*9,cy+23,8,8,2);ctx.fill();}
}

// ─── Full redraw ──────────────────────────────────────────────────────────────
function redraw(){
  animT++;
  ctx.clearRect(0,0,CW,CH);
  drawPlate();

  // Placed pieces
  SLOTS.forEach(s=>{
    if(placed[s.id]) drawPiece(ctx,s.x,s.y,s.w,s.h,s.kind);
  });

  // Decorations on top of pieces
  drawBodyDeco();
  drawRobotFace();

  // Ghost outlines for empty slots
  SLOTS.forEach(s=>drawSlotGhost(s,animT));

  // Dragging piece follows cursor
  if(drag){
    const s=SLOTS.find(sl=>sl.id===drag.slotId);
    drawPiece(ctx,drag.curX-drag.offX,drag.curY-drag.offY,s.w,s.h,s.kind,.82);
  }

  requestAnimationFrame(redraw);
}
redraw();

// ─── Build tray ───────────────────────────────────────────────────────────────
const trayCanvas={};
SLOTS.forEach(s=>{
  const tc=document.createElement('canvas');
  const tw=s.w*DPR*0.8|0, th=s.h*DPR*0.8|0;
  tc.width=tw;tc.height=th;
  tc.style.width=(tw/DPR)+'px';tc.style.height=(th/DPR)+'px';
  tc.className='t-piece';tc.dataset.id=s.id;
  const tc2=tc.getContext('2d');tc2.scale(DPR*0.8,DPR*0.8);
  drawPiece(tc2,0,0,s.w,s.h,s.kind);
  trayCanvas[s.id]=tc;
  document.getElementById('tray').appendChild(tc);
});

// ─── Pointer events ───────────────────────────────────────────────────────────
function canvasXY(e){
  const r=canvas.getBoundingClientRect();
  const cx=(e.clientX||e.touches[0].clientX)-r.left;
  const cy=(e.clientY||e.touches[0].clientY)-r.top;
  return{x:cx*(CW/r.width),y:cy*(CH/r.height)};
}

// Start drag from tray
document.getElementById('tray').addEventListener('pointerdown',e=>{
  const el=e.target.closest('.t-piece');
  if(!el||el.classList.contains('used'))return;
  e.preventDefault();
  const id=el.dataset.id;
  const s=SLOTS.find(sl=>sl.id===id);
  // Map tray piece center to canvas start point = slot center
  const cr=canvas.getBoundingClientRect();
  const startX=s.x+s.w/2, startY=s.y+s.h/2;
  drag={slotId:id, offX:s.w/2, offY:s.h/2, curX:startX, curY:startY, pieceEl:el};
  el.style.opacity='0.3';
},{passive:false});

window.addEventListener('pointermove',e=>{
  if(!drag)return;
  e.preventDefault();
  const{x,y}=canvasXY(e);
  drag.curX=x;drag.curY=y;
},{passive:false});

window.addEventListener('pointerup',e=>{
  if(!drag)return;
  const{x,y}=canvasXY(e);
  const s=SLOTS.find(sl=>sl.id===drag.slotId);
  // Check if dropped near target slot center
  const cx=s.x+s.w/2, cy=s.y+s.h/2;
  const dist=Math.hypot(x-drag.offX-cx, y-drag.offY-cy);
  if(dist<Math.max(s.w,s.h)*.65 && !placed[s.id]){
    placed[s.id]=true;
    drag.pieceEl.classList.add('used');
    playSnap();
    updateProgress();
    if(Object.keys(placed).length===SLOTS.length) setTimeout(onDone,700);
  }else{
    drag.pieceEl.style.opacity='';
  }
  drag=null;
});

function playSnap(){
  try{
    const a=new(window.AudioContext||window.webkitAudioContext)();
    const o=a.createOscillator(),g=a.createGain();
    o.connect(g);g.connect(a.destination);
    o.type='sine';o.frequency.value=660;
    o.frequency.exponentialRampToValueAtTime(880,a.currentTime+.08);
    g.gain.setValueAtTime(.18,a.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,a.currentTime+.18);
    o.start();o.stop(a.currentTime+.2);
  }catch(e){}
}

function updateProgress(){
  const n=Object.keys(placed).length;
  document.getElementById('prog-txt').textContent=`${n}/${SLOTS.length}`;
  SLOTS.forEach((_,i)=>{
    if(placed[SLOTS[i].id]) document.getElementById('d'+i).classList.add('on');
  });
}

function onDone(){
  doneFlag=true;
  document.getElementById('hdr').className='done';
  document.getElementById('title').textContent='🤖 הרובוט מוכן!';
  document.getElementById('instr').textContent='יצרתם רובוט טורטייה אמיתי! 🎉';
  document.getElementById('tray').style.display='none';
  document.getElementById('tray-label').style.display='none';
  const dp=document.getElementById('done-panel');
  dp.style.display='flex';
}
</script>
</body>
</html>
