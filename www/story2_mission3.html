<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>משימה 3 - סדרו את המתכון</title>
<link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">
<style>
:root { --green:#2d8a4e; --green-light:#57c97a; --green-dark:#1a5e35; --yellow:#f7c948; --bg:#f5f0e8; }
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { font-family:'Varela Round',Arial,sans-serif; direction:rtl; background:var(--bg); min-height:100vh; display:flex; flex-direction:column; overflow-x:hidden; }

.header { background:linear-gradient(135deg,var(--green-dark),var(--green)); padding:11px 20px; display:flex; align-items:center; justify-content:space-between; box-shadow:0 3px 12px rgba(0,0,0,0.2); flex-shrink:0; }
.header-brand { display:flex; align-items:center; gap:8px; color:white; }
.header-icon { width:34px; height:34px; background:rgba(255,255,255,0.15); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:18px; }
.header-text { font-size:14px; font-weight:700; line-height:1.2; }
.header-text span { font-size:11px; opacity:0.75; display:block; }
.mission-tag { background:rgba(255,107,53,0.25); border:1px solid rgba(255,107,53,0.6); color:#ffb347; font-size:12px; font-weight:700; padding:4px 12px; border-radius:20px; }

.main { flex:1; padding:12px 12px 16px; max-width:560px; width:100%; margin:0 auto; display:flex; flex-direction:column; gap:10px; }

.bito-bar { background:#071a0e; border-radius:16px; padding:10px 14px; display:flex; align-items:center; gap:10px; border:2px solid rgba(0,255,136,0.2); position:relative; overflow:hidden; min-height:58px; }
.bito-bar::before { content:''; position:absolute; inset:0; background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,255,136,0.012) 3px,rgba(0,255,136,0.012) 6px); pointer-events:none; }
.bito-avatar { width:42px; height:42px; border-radius:50%; border:2px solid rgba(0,255,136,0.4); background:#071a0e; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:22px; }
.bito-speech { flex:1; font-size:13px; font-weight:700; color:white; line-height:1.45; }
.cursor { display:inline-block; width:2px; height:1em; background:#00ff88; animation:cur 0.7s step-end infinite; vertical-align:text-bottom; }
@keyframes cur { 0%,100%{opacity:1} 50%{opacity:0} }
.bito-dot { width:7px; height:7px; border-radius:50%; background:#00ff88; box-shadow:0 0 5px #00ff88; animation:bd 1s ease-in-out infinite; flex-shrink:0; }
@keyframes bd { 0%,100%{opacity:1} 50%{opacity:0.2} }

.progress-row { display:flex; align-items:center; gap:4px; }
.prog-step { flex:1; height:7px; border-radius:4px; background:rgba(45,138,78,0.12); border:1px solid rgba(45,138,78,0.15); transition:all 0.4s; position:relative; overflow:hidden; }
.prog-step.done { background:var(--green); border-color:var(--green); }
.prog-step.done::after { content:''; position:absolute; inset:0; background:linear-gradient(90deg,transparent,rgba(255,255,255,0.35),transparent); animation:shimmer 0.8s forwards; }
@keyframes shimmer { from{transform:translateX(-100%)} to{transform:translateX(100%)} }
.prog-step.active { background:var(--yellow); border-color:var(--yellow); box-shadow:0 0 7px rgba(247,201,72,0.5); }
.prog-label { font-size:11px; font-weight:700; color:var(--green-dark); text-align:center; margin-top:4px; }

.instruction { background:linear-gradient(135deg,#e8f5e9,#d4edda); border-radius:12px; padding:9px 14px; border:2px solid rgba(45,138,78,0.2); font-size:13px; font-weight:700; color:var(--green-dark); text-align:center; }

.sequence-bar { background:white; border:2px solid rgba(45,138,78,0.15); border-radius:12px; padding:7px 10px; display:flex; align-items:center; gap:4px; flex-wrap:wrap; min-height:42px; }
.seq-label { font-size:11px; font-weight:700; color:#bbb; flex-shrink:0; }
.seq-item { font-size:20px; animation:seqPop 0.4s cubic-bezier(0.34,1.5,0.64,1); }
.seq-item:not(:last-child)::after { content:"›"; font-size:13px; color:#ccc; margin:0 1px; }
@keyframes seqPop { from{transform:scale(0) rotate(-15deg);opacity:0} to{transform:scale(1);opacity:1} }

.steps-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:9px; }
.step-card { background:white; border:3px solid #e0d5c5; border-radius:16px; overflow:hidden; cursor:pointer; transition:all 0.22s cubic-bezier(0.34,1.3,0.64,1); position:relative; user-select:none; box-shadow:0 2px 8px rgba(0,0,0,0.06); }
.step-card:hover { border-color:var(--green); transform:translateY(-3px) scale(1.03); box-shadow:0 8px 22px rgba(45,138,78,0.2); }
.step-card:active { transform:scale(0.96); }
.step-card.used { opacity:0.35; pointer-events:none; filter:grayscale(0.5); }
.step-card.correct { border-color:var(--green-light); background:#f0fdf4; animation:correctFlash 0.45s; }
@keyframes correctFlash { 0%{transform:scale(1)} 40%{transform:scale(1.07)} 100%{transform:scale(1)} }
.step-card.wrong { border-color:#ef4444; animation:wrongShake 0.38s; }
@keyframes wrongShake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-7px)} 75%{transform:translateX(7px)} }
.step-num-badge { position:absolute; top:7px; right:7px; width:22px; height:22px; background:var(--green-dark); color:white; border-radius:50%; font-size:11px; font-weight:900; display:flex; align-items:center; justify-content:center; z-index:2; box-shadow:0 2px 5px rgba(0,0,0,0.2); }
.step-img { width:100%; aspect-ratio:1/1; object-fit:cover; display:block; }
.step-label { padding:7px 9px; font-size:11px; font-weight:700; color:#444; text-align:center; line-height:1.35; background:white; border-top:1px solid #f0ece4; }

.trans-overlay { position:fixed; inset:0; z-index:100; background:rgba(26,94,53,0.96); backdrop-filter:blur(4px); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; opacity:0; pointer-events:none; transition:opacity 0.25s; }
.trans-overlay.show { opacity:1; pointer-events:auto; }
.trans-img { width:160px; height:160px; object-fit:cover; border-radius:20px; border:3px solid rgba(255,255,255,0.3); box-shadow:0 10px 30px rgba(0,0,0,0.4); animation:transIn 0.4s cubic-bezier(0.34,1.5,0.64,1); }
@keyframes transIn { from{transform:scale(0.6) rotate(-5deg);opacity:0} to{transform:scale(1);opacity:1} }
.trans-emoji { font-size:44px; animation:transIn 0.4s 0.1s both cubic-bezier(0.34,1.5,0.64,1); }
.trans-title { font-size:22px; font-weight:900; color:white; text-align:center; }
.trans-sub { font-size:14px; color:rgba(255,255,255,0.75); text-align:center; }

.win-screen { position:fixed; inset:0; z-index:200; background:linear-gradient(160deg,#0a1a10,#1a5e35); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; padding:24px; opacity:0; pointer-events:none; transition:opacity 0.5s; }
.win-screen.show { opacity:1; pointer-events:auto; }
.win-img { width:180px; height:180px; object-fit:cover; border-radius:24px; border:3px solid rgba(247,201,72,0.5); box-shadow:0 12px 40px rgba(0,0,0,0.5); animation:bounceIn 0.7s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes bounceIn { 0%{transform:scale(0)} 100%{transform:scale(1)} }
.win-title { font-size:26px; font-weight:900; color:white; text-align:center; }
.win-sub { font-size:14px; color:rgba(255,255,255,0.8); text-align:center; line-height:1.6; max-width:300px; background:rgba(255,255,255,0.07); border-radius:16px; padding:14px 18px; }
.win-sub strong { color:#f7c948; }
.btn-continue { background:linear-gradient(135deg,#f7c948,#ff9f2f); color:#1a1a1a; border:none; border-radius:50px; padding:15px 50px; font-family:inherit; font-size:18px; font-weight:900; cursor:pointer; box-shadow:0 6px 22px rgba(247,201,72,0.5); animation:pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{box-shadow:0 6px 22px rgba(247,201,72,0.5)} 50%{box-shadow:0 8px 32px rgba(247,201,72,0.8);transform:scale(1.03)} }
.stars-burst { position:fixed; inset:0; pointer-events:none; z-index:199; overflow:hidden; }
.star-p { position:absolute; font-size:22px; animation:starFly 1.3s ease-out forwards; }
@keyframes starFly { 0%{opacity:1;transform:translate(0,0) scale(1)} 100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0.2) rotate(360deg)} }
</style>
</head>
<body>

<div class="header">
  <div class="header-brand">
    <div class="header-icon">🍝</div>
    <div class="header-text">מאפה פסטה גבינות וירקות מוחבאים<span>סדרו את שלבי ההכנה!</span></div>
  </div>
  <div class="mission-tag">משימה 3/3</div>
</div>

<div class="main">
  <div class="bito-bar">
    <div class="bito-avatar">🤖</div>
    <div class="bito-speech" id="bitoSpeech"><span class="cursor"></span></div>
    <div class="bito-dot"></div>
  </div>
  <div>
    <div class="progress-row" id="progressRow"></div>
    <div class="prog-label" id="progLabel">שלב 1 מתוך 7</div>
  </div>
  <div class="instruction" id="instruction">👆 לחצו על השלב הראשון בהכנת המק אנד ציז!</div>
  <div class="sequence-bar">
    <span class="seq-label">הסדר:</span>
    <span id="seqItems"></span>
  </div>
  <div class="steps-grid" id="stepsGrid"></div>
</div>

<div class="trans-overlay" id="transOverlay">
  <img class="trans-img" id="transImg" src="" alt="">
  <div class="trans-emoji" id="transEmoji"></div>
  <div class="trans-title" id="transTitle"></div>
  <div class="trans-sub" id="transSub"></div>
</div>

<div class="win-screen" id="winScreen">
  <div class="stars-burst" id="starsBurst"></div>
  <img class="win-img" id="winImg" src="" alt="המנה המוכנה">
  <div class="win-title">🎉 כל הכבוד! המק אנד ציז מוכן!</div>
  <div class="win-sub">סידרתם את כל 7 השלבים בסדר הנכון!<br><strong>הירקות המוחבאים? לא מרגישים אותם כלל 😄</strong><br>עכשיו הורידו את המתכון המלא 🍝</div>
  <button class="btn-continue" onclick="goNext()">להורדת המתכון ←</button>
</div>

  { order:3, emoji:"🥛", text:"מכינים רוטב: חמאה+קמח+חלב+ירקות מגורדים",  trans:{ emoji:"🌀", title:"רוטב סמיך וטעים!",   sub:"הגזר והבטטה בפנים..." } },

];

const BITO_MSGS = [
  "לחצו על השלב הראשון בהכנת המק אנד ציז! 🥕",
  "מצוין! ועכשיו — מה עושים עם הפסטה? 🍝",
  "כל הכבוד! איך מכינים את הרוטב? 🥛",
  "נהדר! ועכשיו מוסיפים את הגבינות! 🧀",
  "יאמי! ועכשיו מערבבים הכל ביחד! 🥣",
  "מעולה! מכינים את התבנית לתנור 🍞",
  "כמעט סיימנו! רק התנור נשאר... 🔥",
];
const BITO_WRONG = [
  "לא זה השלב הבא... נסו שוב! 🤔",
  "ביטו אומר: הסדר שונה קצת! 💻",
  "חשבו שוב — מה עושים קודם? 🙈",
];

let currentOrder = 1;
const shuffled = [...STEPS].sort(() => Math.random() - 0.5);
let typeTimer = null;

function init() {
  buildProgress();
  buildGrid();
  typeMessage(BITO_MSGS[0]);
  document.getElementById("winImg").src = "data:image/jpeg;base64," + IMGS[7];
}

function buildProgress() {
  const row = document.getElementById("progressRow");
  row.innerHTML = "";
  STEPS.forEach((s, i) => {
    const d = document.createElement("div");
    d.className = "prog-step" + (i < currentOrder-1 ? " done" : i === currentOrder-1 ? " active" : "");
    d.id = "prog" + i;
    row.appendChild(d);
  });
}

function buildGrid() {
  const grid = document.getElementById("stepsGrid");
  grid.innerHTML = "";
  shuffled.forEach(step => {
    const card = document.createElement("div");
    card.className = "step-card" + (step.order < currentOrder ? " used" : "");
    card.id = "card-" + step.order;
    const img = document.createElement("img");
    img.className = "step-img";
    img.src = "data:image/jpeg;base64," + IMGS[step.order];
    img.alt = step.text;
    const badge = document.createElement("div");
    badge.className = "step-num-badge";
    badge.textContent = step.order;
    const label = document.createElement("div");
    label.className = "step-label";
    label.textContent = step.text;
    card.appendChild(badge);
    card.appendChild(img);
    card.appendChild(label);
    card.onclick = () => pickStep(step, card);
    grid.appendChild(card);
  });
}

function pickStep(step, card) {
  if (step.order === currentOrder) {
    card.classList.add("correct");
    setTimeout(() => card.classList.add("used"), 450);
    const seq = document.getElementById("seqItems");
    const span = document.createElement("span");
    span.className = "seq-item";
    span.textContent = step.emoji;
    seq.appendChild(span);
    document.getElementById("prog" + (currentOrder-1)).classList.replace("active","done");
    currentOrder++;
    if (currentOrder <= STEPS.length) {
      document.getElementById("prog" + (currentOrder-1)).classList.add("active");
      document.getElementById("progLabel").textContent = "שלב " + currentOrder + " מתוך " + STEPS.length;
    }
    showTransition(step, () => {
      if (currentOrder > STEPS.length) { setTimeout(showWin, 300); }
      else {
        typeMessage(BITO_MSGS[currentOrder-1]);
        document.getElementById("instruction").textContent = "👆 לחצו על שלב " + currentOrder + " — מה עושים עכשיו?";
      }
    });
  } else {
    card.classList.add("wrong");
    setTimeout(() => card.classList.remove("wrong"), 400);
    const msg = BITO_WRONG[Math.floor(Math.random()*BITO_WRONG.length)];
    typeMessage(msg, () => { if (currentOrder <= STEPS.length) typeMessage(BITO_MSGS[currentOrder-1]); });
  }
}

function showTransition(step, cb) {
  const ov = document.getElementById("transOverlay");
  document.getElementById("transImg").src = "data:image/jpeg;base64," + IMGS[step.order];
  document.getElementById("transEmoji").textContent = step.trans.emoji;
  document.getElementById("transTitle").textContent = step.trans.title;
  document.getElementById("transSub").textContent = step.trans.sub;
  ov.classList.add("show");
  setTimeout(() => { ov.classList.remove("show"); setTimeout(cb, 280); }, 1400);
}

function typeMessage(msg, cb) {
  const el = document.getElementById("bitoSpeech");
  if (typeTimer) clearInterval(typeTimer);
  el.innerHTML = "<span class='cursor'></span>";
  let i = 0;
  typeTimer = setInterval(() => {
    if (i >= msg.length) {
      clearInterval(typeTimer);
      el.innerHTML = msg + "<span class='cursor'></span>";
      if (cb) setTimeout(cb, 700);
      return;
    }
    el.innerHTML = msg.slice(0, ++i) + "<span class='cursor'></span>";
  }, 30);
}

function showWin() { launchStars(); document.getElementById("winScreen").classList.add("show"); }

function launchStars() {
  const burst = document.getElementById("starsBurst");
  ["⭐","✨","🌟","💫","🎉","🍝","🧀"].forEach(e => {
    for (let j = 0; j < 3; j++) {
      const s = document.createElement("span");
      s.className = "star-p"; s.textContent = e;
      const angle = Math.random()*360, dist = 120+Math.random()*160;
      s.style.cssText = "left:50%;top:50%;--tx:" + Math.cos(angle*Math.PI/180)*dist + "px;--ty:" + Math.sin(angle*Math.PI/180)*dist + "px;animation-delay:" + Math.random()*0.4 + "s;";
      burst.appendChild(s);
    }
  });
}

function goNext() { window.location.href = "recipe2_download.html"; }

init();
</script>
